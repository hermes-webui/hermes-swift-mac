name: Build and Release macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v1.0.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      # Unified tag name — works for both push-tag triggers and manual dispatch.
      BUILD_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Build universal binary (arm64 + x86_64)
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/HermesAgent \
            .build/x86_64-apple-macosx/release/HermesAgent \
            -output .build/universal/HermesAgent

      - name: Create app bundle
        run: |
          APP_NAME="HermesAgent"
          DISPLAY_NAME="Hermes Agent"
          APP_BUNDLE="$DISPLAY_NAME.app"
          VERSION="${BUILD_TAG#v}"

          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          mkdir -p "$APP_BUNDLE/Contents/Frameworks"

          cp ".build/universal/$APP_NAME" "$APP_BUNDLE/Contents/MacOS/"
          chmod +x "$APP_BUNDLE/Contents/MacOS/$APP_NAME"

          # Embed Sparkle.framework (macOS slice from the xcframework)
          SPARKLE_XCFRAMEWORK=$(find .build/artifacts -name "Sparkle.xcframework" | head -1)
          SPARKLE_FW="$SPARKLE_XCFRAMEWORK/macos-arm64_x86_64/Sparkle.framework"
          cp -R "$SPARKLE_FW" "$APP_BUNDLE/Contents/Frameworks/"

          # Fix rpath so the binary finds the embedded framework
          install_name_tool \
            -add_rpath "@executable_path/../Frameworks" \
            "$APP_BUNDLE/Contents/MacOS/$APP_NAME"

          # Convert icon
          ICONSET="AppIcon.iconset"
          mkdir -p "$ICONSET"
          sips -z 16 16     "Hermes Icon.png" --out "$ICONSET/icon_16x16.png"
          sips -z 32 32     "Hermes Icon.png" --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32     "Hermes Icon.png" --out "$ICONSET/icon_32x32.png"
          sips -z 64 64     "Hermes Icon.png" --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128   "Hermes Icon.png" --out "$ICONSET/icon_128x128.png"
          sips -z 256 256   "Hermes Icon.png" --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256   "Hermes Icon.png" --out "$ICONSET/icon_256x256.png"
          sips -z 512 512   "Hermes Icon.png" --out "$ICONSET/icon_256x256@2x.png"
          sips -z 512 512   "Hermes Icon.png" --out "$ICONSET/icon_512x512.png"
          sips -z 1024 1024 "Hermes Icon.png" --out "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o "$APP_BUNDLE/Contents/Resources/AppIcon.icns"
          rm -rf "$ICONSET"

          # Write Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string 'Hermes Agent'"              "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string ai.get-hermes.HermesAgent" "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $VERSION"                 "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION"      "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleExecutable string HermesAgent"           "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundlePackageType string APPL"                 "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon"                 "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 12.0"              "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSHighResolutionCapable bool true"               "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool false"                          "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Hermes Agent uses the microphone for voice input in the chat interface.'" "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSUserNotificationUsageDescription string 'Hermes Agent notifies you when an AI response is ready while the window is in the background.'" "$APP_BUNDLE/Contents/Info.plist"
          # Sparkle keys
          /usr/libexec/PlistBuddy -c "Add :SUPublicEDKey string 'daAlTqdBbYPSCDjS9IfTCJOFDo1jqtjMRZluhtAbKMY='" "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :SUFeedURL string 'https://hermes-webui.github.io/hermes-swift-mac/appcast.xml'" "$APP_BUNDLE/Contents/Info.plist"

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "build-keychain-password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "build-keychain-password" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -T /usr/bin/codesign

          # Import Apple's Developer ID intermediate CAs so codesign can build
          # a complete cert chain even if the .p12 only contains the leaf.
          # Without a full chain, notarization rejects with "signature is invalid".
          for url in \
            "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" \
            "https://www.apple.com/certificateauthority/DeveloperIDCA.cer" \
            "https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer" \
            "https://www.apple.com/appleca/AppleIncRootCertificate.cer"; do
            NAME=$(basename "$url")
            curl -fsSL "$url" -o "$RUNNER_TEMP/$NAME" || continue
            security import "$RUNNER_TEMP/$NAME" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true
          done

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "build-keychain-password" "$KEYCHAIN_PATH"

          # Show what identities were imported (no secrets leaked by find-identity)
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm "$CERT_PATH"

      - name: Sign app bundle (Developer ID + hardened runtime)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DISPLAY_NAME="Hermes Agent"
          APP_BUNDLE="$DISPLAY_NAME.app"
          IDENTITY="Developer ID Application"
          SPARKLE="$APP_BUNDLE/Contents/Frameworks/Sparkle.framework/Versions/B"

          # Sign inside-out: every nested Mach-O / bundle in Sparkle.framework
          # must be re-signed with our Developer ID before the framework itself.
          # Preserve original entitlements on Sparkle's XPC services — stripping
          # them causes Apple notarization to reject with "Invalid".
          # --timestamp forces codesign to embed a secure timestamp from Apple's
          # TSA, which notarization requires (default behavior is unreliable in CI).

          # 1. Updater.app (nested app bundle): inner binary then bundle
          codesign --force --timestamp --options runtime --sign "$IDENTITY" \
            "$SPARKLE/Updater.app/Contents/MacOS/Updater"
          codesign --force --timestamp --options runtime --sign "$IDENTITY" \
            "$SPARKLE/Updater.app"

          # 2. XPC services: inner binaries first, then bundles (preserve entitlements on bundles)
          codesign --force --timestamp --options runtime --sign "$IDENTITY" \
            "$SPARKLE/XPCServices/Downloader.xpc/Contents/MacOS/Downloader"
          codesign --force --timestamp --options runtime \
            --preserve-metadata=entitlements \
            --sign "$IDENTITY" "$SPARKLE/XPCServices/Downloader.xpc"
          codesign --force --timestamp --options runtime --sign "$IDENTITY" \
            "$SPARKLE/XPCServices/Installer.xpc/Contents/MacOS/Installer"
          codesign --force --timestamp --options runtime \
            --preserve-metadata=entitlements \
            --sign "$IDENTITY" "$SPARKLE/XPCServices/Installer.xpc"

          # 3. Standalone Autoupdate helper binary
          codesign --force --timestamp --options runtime --sign "$IDENTITY" \
            "$SPARKLE/Autoupdate"

          # 4. Sparkle.framework itself
          codesign --force --timestamp --options runtime --sign "$IDENTITY" \
            "$APP_BUNDLE/Contents/Frameworks/Sparkle.framework"

          # 5. Main app binary + bundle
          codesign \
            --force \
            --timestamp \
            --options runtime \
            --entitlements Entitlements.plist \
            --sign "$IDENTITY" \
            "$APP_BUNDLE"

          # Verify locally, then dump the full signature of the main binaries so
          # CI logs show the embedded timestamp and cert chain — critical for
          # diagnosing notarization "signature is invalid" rejections.
          codesign --verify --deep --strict "$APP_BUNDLE"
          echo "=== codesign -dvv HermesAgent ==="
          codesign -dvv "$APP_BUNDLE/Contents/MacOS/HermesAgent" 2>&1
          echo "=== codesign -dvv Sparkle.framework ==="
          codesign -dvv "$APP_BUNDLE/Contents/Frameworks/Sparkle.framework" 2>&1
          echo "Signing OK"

      - name: Create DMG
        run: |
          DISPLAY_NAME="Hermes Agent"
          APP_BUNDLE="$DISPLAY_NAME.app"
          DMG_NAME="Hermes-Agent-${BUILD_TAG}.dmg"

          mkdir -p dmg-staging
          # ditto preserves framework symlinks correctly; cp -r mishandles them
          # on older macOS (per Apple DTS), invalidating nested signatures.
          ditto "$APP_BUNDLE" "dmg-staging/$APP_BUNDLE"
          ln -s /Applications dmg-staging/Applications

          # -fs APFS is critical: the default HFS+ filesystem adds metadata
          # that invalidates signatures on nested frameworks (Sparkle.framework),
          # causing notarization to reject the DMG as "signature is invalid"
          # even though codesign --verify passes locally.
          hdiutil create -volname "Hermes Agent" \
            -srcfolder dmg-staging \
            -fs APFS \
            -ov -format UDZO \
            "$DMG_NAME"

          rm -rf dmg-staging
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Submit to Apple notary service and fail loudly if status != Accepted.
          # --wait returns 0 even when the archive is rejected, so we must parse
          # the JSON status ourselves.
          OUTPUT=$(xcrun notarytool submit "${{ env.DMG_NAME }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)
          echo "$OUTPUT"
          SUBMISSION_ID=$(echo "$OUTPUT" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          STATUS=$(echo "$OUTPUT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','Unknown'))")
          echo "NOTARIZATION_ID=$SUBMISSION_ID" >> $GITHUB_ENV
          echo "Notarization status: $STATUS"
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization rejected with status: $STATUS (see Fetch notarization log step for details)"
            exit 1
          fi

      - name: Fetch notarization log (always, for diagnostics)
        if: always()
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "${{ env.NOTARIZATION_ID }}" ]; then
            xcrun notarytool log "${{ env.NOTARIZATION_ID }}" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              notarization-log.json || true
            cat notarization-log.json || echo "No log available"
          else
            echo "No notarization ID available — skipping log fetch"
          fi

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "${{ env.DMG_NAME }}"
          xcrun stapler validate "${{ env.DMG_NAME }}"
          echo "Notarization and stapling OK"

      - name: Generate Sparkle ed25519 signature
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Download Sparkle tools matching the version used by the app
          SPARKLE_VERSION=$(swift package show-dependencies --format json | python3 -c "
          import json,sys
          deps = json.load(sys.stdin)
          for d in deps.get('dependencies', []):
              if 'sparkle' in d.get('url','').lower():
                  print(d['version'])
                  break
          " 2>/dev/null || echo "2.9.1")

          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-$SPARKLE_VERSION.tar.xz" \
            -o sparkle-tools.tar.xz
          mkdir -p sparkle-tools
          tar -xf sparkle-tools.tar.xz -C sparkle-tools

          # sign_update prints a full `sparkle:edSignature="..." length="N"` line.
          # Extract just the edSignature value so it can be used as an attribute value.
          SIG_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | sparkle-tools/bin/sign_update "${{ env.DMG_NAME }}" -f -)
          SIG=$(echo "$SIG_OUTPUT" | sed -E 's/.*edSignature="([^"]+)".*/\1/')
          SIZE=$(stat -f%z "${{ env.DMG_NAME }}")
          VERSION="${BUILD_TAG#v}"

          echo "SPARKLE_SIG=$SIG" >> $GITHUB_ENV
          echo "SPARKLE_SIZE=$SIZE" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

          echo "Sparkle signature: $SIG"
          echo "DMG size: $SIZE bytes"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_TAG }}
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
          body: |
            ## Hermes Agent for macOS — ${{ env.RELEASE_VERSION }}

            Download `${{ env.DMG_NAME }}`, open the DMG, and drag **Hermes Agent** to your Applications folder.

            This release is signed with a Developer ID certificate and notarized by Apple.
            macOS will open it without any Gatekeeper warning.

            **Requirements:** macOS 12+ (Monterey or later)

            ---
            <!-- Sparkle appcast metadata (do not remove) -->
            <!-- sparkle:edSignature: ${{ env.SPARKLE_SIG }} -->
            <!-- sparkle:length: ${{ env.SPARKLE_SIZE }} -->

      - name: Update appcast.xml on main
        run: |
          set -euo pipefail
          PUBDATE=$(LC_ALL=C date -u +"%a, %d %b %Y %H:%M:%S +0000")
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${RELEASE_VERSION}/${DMG_NAME}"
          NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${RELEASE_VERSION}"

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          VERSION="$RELEASE_VERSION" \
            PUBDATE="$PUBDATE" \
            RELEASE_URL="$RELEASE_URL" \
            NOTES_URL="$NOTES_URL" \
            SIG="$SPARKLE_SIG" \
            SIZE="$SPARKLE_SIZE" \
            python3 scripts/update_appcast.py

          if git diff --quiet appcast.xml; then
            echo "No appcast change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: add v${RELEASE_VERSION} to appcast.xml [skip ci]"
          git push origin main
